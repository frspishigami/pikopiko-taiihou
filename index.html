  const topY = Math.min(80, yForStep(maxStep) - 30, numberY - 16);
  const bottomY = Math.max(245, yForStep(minStep) + 30);

  parts.push(`<svg viewBox="0 ${topY} ${totalWidth} ${bottomY - topY}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">`);
  for (let s = 30; s <= 38; s += 2) {
    const y = yForStep(s);
    parts.push(`<line x1="${STAFF_LEFT}" y1="${y}" x2="${staffRight}" y2="${y}" stroke="${COLOR}" stroke-width="2"/>`);
  }
  parts.push(`<line x1="${STAFF_LEFT}" y1="${yForStep(30)}" x2="${STAFF_LEFT}" y2="${yForStep(38)}" stroke="${COLOR}" stroke-width="2"/>`);
  parts.push(`<line x1="${staffRight-6}" y1="${yForStep(30)}" x2="${staffRight-6}" y2="${yForStep(38)}" stroke="${COLOR}" stroke-width="2"/>`);
  parts.push(`<line x1="${staffRight}" y1="${yForStep(30)}" x2="${staffRight}" y2="${yForStep(38)}" stroke="${COLOR}" stroke-width="4"/>`);
  parts.push(...headerParts);
  parts.push(timeSignatureMarkup(tsX, ts));
  if (barlineAt !== null) {
    parts.push(`<line x1="${barlineAt}" y1="${yForStep(30)}" x2="${barlineAt}" y2="${yForStep(38)}" stroke="${COLOR}" stroke-width="2"/>`);
  }

  function drawLedgers(cx, step) {
    let m = '';
    ledgerSteps(step).forEach(s => {
      const y = yForStep(s);
      m += `<line x1="${cx-12}" y1="${y}" x2="${cx+12}" y2="${y}" stroke="${COLOR}" stroke-width="2"/>`;
    });
    return m;
  }
  function accidentalGlyph(cxPos, yPos, info) {
    const sigAcc = keySignatureAccidental(info.letter, key);
    if (info.accidental === sigAcc) return '';
    const d = info.accidental;
    const sign = d === 0 ? '\u266E' : (d > 0 ? '\u266F'.repeat(d) : '\u266D'.repeat(-d));
    const fs = Math.abs(d) > 1 ? 11 : 14;
    return `<text x="${cxPos-17}" y="${yPos+6}" font-size="${fs}" fill="${COLOR}" text-anchor="middle">${sign}</text>`;
  }

  const OFFSET = 10;
  const upperIsCp = mode === 'above';

  slots.forEach((s, i) => {
    const isFinalGroupSlot = (s.groupIdx === cf.length - 1);
    const isStrong = s.posInGroup === 0;
    const cx = slotX[i];
    const cpInfo = pitchInfoInKey(cp[i], key);
    const stepCp = cpInfo.diatonicStep, yCp = yForStep(stepCp);
    const dur = isFinalGroupSlot ? cfUnit : cpUnit;
    let inner = '';

    if (isStrong) {
      const cfInfo = pitchInfoInKey(s.cfPitch, key);
      const stepCf = cfInfo.diatonicStep, yCf = yForStep(stepCf);
      const closeInterval = Math.abs(stepCf - stepCp) <= 1;
      let cfX = cx, cpX = cx;
      if (closeInterval) { if (upperIsCp) cpX = cx + OFFSET; else cfX = cx + OFFSET; }

      inner += drawLedgers(cfX, stepCf);
      inner += drawLedgers(cpX, stepCp);
      inner += accidentalGlyph(cfX, yCf, cfInfo);
      inner += accidentalGlyph(cpX, yCp, cpInfo);
      const cfStemUp = !upperIsCp, cpStemUp = upperIsCp;
      inner += noteShapeMarkup(cfX, yCf, cfUnit, cfStemUp);
      inner += noteShapeMarkup(cpX, yCp, dur, cpStemUp);
    } else {
      inner += drawLedgers(cx, stepCp);
      inner += accidentalGlyph(cx, yCp, cpInfo);
      inner += noteShapeMarkup(cx, yCp, dur, upperIsCp);
    }

    const degree = Math.abs(pitchInfoInKey(s.cfPitch, key).diatonicStep - stepCp) + 1;
    inner += `<text x="${cx}" y="${numberY}" font-size="15" font-weight="bold" fill="${COLOR}" text-anchor="middle">${degree}</text>`;

    parts.push(`<g id="evt-${i}" class="evt">${inner}</g>`);
  });

  parts.push('</svg>');
  return parts.join('\n');
}


function varLen(value) {
  const bytes = [value & 0x7F];
  value = Math.floor(value / 128);
  while (value > 0) {
    bytes.unshift((value & 0x7F) | 0x80);
    value = Math.floor(value / 128);
  }
  return bytes;
}
function u32be(n) { return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255]; }
function u16be(n) { return [(n >>> 8) & 255, n & 255]; }
function strBytes(s) { return Array.from(s).map(c => c.charCodeAt(0)); }
function log2int(n) { let p = 0, v = n; while (v > 1) { v >>= 1; p++; } return p; }

function buildMidiCounterpoint(cf, cp, ts, bpm, uniformDuration) {
  const PPQ = 480;
  const unitTicks = PPQ / 4;
  const durTicks = uniformDuration * unitTicks;
  const evs = [];
  const name = 'Pikopiko Counterpoint (1:1)';
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x03, name.length, ...strBytes(name)] });
  const usPerQuarter = Math.round(60000000 / bpm);
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x51, 0x03, (usPerQuarter>>>16)&255, (usPerQuarter>>>8)&255, usPerQuarter&255] });
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x58, 0x04, ts.num & 255, log2int(ts.den) & 255, 24, 8] });
  evs.push({ tick: 0, priority: 0, bytes: [0xC0, 0] }); // channel 0 (cantus firmus): Acoustic Grand Piano
  evs.push({ tick: 0, priority: 0, bytes: [0xC1, 0] }); // channel 1 (counterpoint): Acoustic Grand Piano

  let cursor = 0;
  for (let i = 0; i < cf.length; i++) {
    const cfNote = pitchInfo(cf[i]).midi, cpNote = pitchInfo(cp[i]).midi;
    evs.push({ tick: cursor, priority: 2, bytes: [0x90, cfNote, 100] });
    evs.push({ tick: cursor, priority: 2, bytes: [0x91, cpNote, 100] });
    evs.push({ tick: cursor + durTicks, priority: 1, bytes: [0x80, cfNote, 0] });
    evs.push({ tick: cursor + durTicks, priority: 1, bytes: [0x81, cpNote, 0] });
    cursor += durTicks;
  }

  evs.sort((a, b) => (a.tick - b.tick) || (a.priority - b.priority));
  const track = [];
  let prevTick = 0;
  evs.forEach(e => {
    track.push(...varLen(e.tick - prevTick));
    track.push(...e.bytes);
    prevTick = e.tick;
  });
  track.push(...varLen(0), 0xFF, 0x2F, 0x00);

  const header = [...strBytes('MThd'), ...u32be(6), ...u16be(0), ...u16be(1), ...u16be(PPQ)];
  const trackChunk = [...strBytes('MTrk'), ...u32be(track.length), ...track];
  return new Uint8Array([...header, ...trackChunk]);
}

function buildMidiThreeVoice(cf, cp, bass, ts, bpm, uniformDuration) {
  const PPQ = 480;
  const unitTicks = PPQ / 4;
  const durTicks = uniformDuration * unitTicks;
  const evs = [];
  const name = 'Pikopiko Counterpoint (3-voice, simplified)';
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x03, name.length, ...strBytes(name)] });
  const usPerQuarter = Math.round(60000000 / bpm);
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x51, 0x03, (usPerQuarter>>>16)&255, (usPerQuarter>>>8)&255, usPerQuarter&255] });
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x58, 0x04, ts.num & 255, log2int(ts.den) & 255, 24, 8] });
  evs.push({ tick: 0, priority: 0, bytes: [0xC0, 0] }); // channel 0 (cantus firmus): Piano
  evs.push({ tick: 0, priority: 0, bytes: [0xC1, 0] }); // channel 1 (counterpoint): Piano
  evs.push({ tick: 0, priority: 0, bytes: [0xC2, 0] }); // channel 2 (bass): Piano

  let cursor = 0;
  for (let i = 0; i < cf.length; i++) {
    const cfNote = pitchInfo(cf[i]).midi, cpNote = pitchInfo(cp[i]).midi, bassNote = pitchInfo(bass[i]).midi;
    evs.push({ tick: cursor, priority: 2, bytes: [0x90, cfNote, 100] });
    evs.push({ tick: cursor, priority: 2, bytes: [0x91, cpNote, 100] });
    evs.push({ tick: cursor, priority: 2, bytes: [0x92, bassNote, 100] });
    evs.push({ tick: cursor + durTicks, priority: 1, bytes: [0x80, cfNote, 0] });
    evs.push({ tick: cursor + durTicks, priority: 1, bytes: [0x81, cpNote, 0] });
    evs.push({ tick: cursor + durTicks, priority: 1, bytes: [0x82, bassNote, 0] });
    cursor += durTicks;
  }

  evs.sort((a, b) => (a.tick - b.tick) || (a.priority - b.priority));
  const track = [];
  let prevTick = 0;
  evs.forEach(e => {
    track.push(...varLen(e.tick - prevTick));
    track.push(...e.bytes);
    prevTick = e.tick;
  });
  track.push(...varLen(0), 0xFF, 0x2F, 0x00);

  const header2 = [...strBytes('MThd'), ...u32be(6), ...u16be(0), ...u16be(1), ...u16be(PPQ)];
  const trackChunk2 = [...strBytes('MTrk'), ...u32be(track.length), ...track];
  return new Uint8Array([...header2, ...trackChunk2]);
}

// Ties have no separate existence in MIDI/audio - a tied pair is just one
// longer note. cpEvents merges each prep's own attack-slot with the
// following tie-slot (except the last, which has no continuation); a
// leading rest is included so the CP timeline still totals m*cfUnit.
function flattenSuspensionForPlayback(cf, prep, cfUnit) {
  const cpUnit = Math.max(1, cfUnit / 2);
  const m = cf.length;
  const cfEvents = cf.map(pitch => ({ pitch, units: cfUnit }));
  const cpEvents = [{ pitch: null, units: cpUnit, isRest: true }];
  for (let k = 0; k < m; k++) {
    const units = (k === m - 1) ? cpUnit : 2 * cpUnit;
    cpEvents.push({ pitch: prep[k], units, isRest: false });
  }
  return { cfEvents, cpEvents };
}

function buildMidiSuspension(cf, prep, ts, bpm, cfUnit) {
  const { cfEvents, cpEvents } = flattenSuspensionForPlayback(cf, prep, cfUnit);
  const PPQ = 480;
  const unitTicks = PPQ / 4;
  const evs = [];
  const name = 'Pikopiko Counterpoint (4th species, suspension)';
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x03, name.length, ...strBytes(name)] });
  const usPerQuarter = Math.round(60000000 / bpm);
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x51, 0x03, (usPerQuarter>>>16)&255, (usPerQuarter>>>8)&255, usPerQuarter&255] });
  evs.push({ tick: 0, priority: 0, bytes: [0xFF, 0x58, 0x04, ts.num & 255, log2int(ts.den) & 255, 24, 8] });
  evs.push({ tick: 0, priority: 0, bytes: [0xC0, 0] });
  evs.push({ tick: 0, priority: 0, bytes: [0xC1, 0] });

  let cursor = 0;
  cfEvents.forEach(e => {
    const dt = e.units * unitTicks;
    const midiNote = pitchInfo(e.pitch).midi;
    evs.push({ tick: cursor, priority: 2, bytes: [0x90, midiNote, 100] });
    evs.push({ tick: cursor + dt, priority: 1, bytes: [0x80, midiNote, 0] });
    cursor += dt;
  });
  let cursor2 = 0;
  cpEvents.forEach(e => {
    const dt = e.units * unitTicks;
    if (!e.isRest) {
      const midiNote = pitchInfo(e.pitch).midi;
      evs.push({ tick: cursor2, priority: 2, bytes: [0x91, midiNote, 100] });
      evs.push({ tick: cursor2 + dt, priority: 1, bytes: [0x81, midiNote, 0] });
    }
    cursor2 += dt;
  });

  evs.sort((a, b) => (a.tick - b.tick) || (a.priority - b.priority));
  const track = [];
  let prevTick = 0;
  evs.forEach(e => {
    track.push(...varLen(e.tick - prevTick));
    track.push(...e.bytes);
    prevTick = e.tick;
  });
  track.push(...varLen(0), 0xFF, 0x2F, 0x00);

  const header3 = [...strBytes('MThd'), ...u32be(6), ...u16be(0), ...u16be(1), ...u16be(PPQ)];
  const trackChunk3 = [...strBytes('MTrk'), ...u32be(track.length), ...track];
  return new Uint8Array([...header3, ...trackChunk3]);
}

function pickUniformDuration(units) {
  const candidates = [1,2,4,8,16].filter(u => units % u === 0);
  const nonTrivial = candidates.filter(u => u > 1);
  const pool = nonTrivial.length ? nonTrivial : candidates;
  return pool[randInt(pool.length)];
}

function generateAndRender() {
  let loIdx = loRangeIdx;
  let hiIdx = hiRangeIdx;
  if (loIdx > hiIdx) { [loIdx, hiIdx] = [hiIdx, loIdx]; loRangeIdx = loIdx; hiRangeIdx = hiIdx; }

  ts = { num: Number(tsNumSel.value), den: Number(tsDenSel.value) };
  const keyMode = document.querySelector('#keyModeRow .voice-btn.active').dataset.keymode;
  key = makeKey(KEY_POOL[Number(keySel.value)], keyMode);
  cpBassOn = cpBassChk.checked;
  isSusMode = false;

  // counterpoint writing needs real melodic room; enforce a minimum octave
  // span (any 12-semitone window always has exactly 7 diatonic notes, and
  // obviously 12 chromatic ones). Bass writing is more constrained (consonant
  // with two voices at once) so it gets a wider minimum to keep generation fast.
  const minWidth = cpBassOn ? 24 : 12;
  if (hiIdx - loIdx < minWidth) {
    hiIdx = loIdx + minWidth;
    const hiBound = indexFromOctavePc(7, 0);
    if (hiIdx > hiBound) { hiIdx = hiBound; loIdx = hiIdx - minWidth; }
    loRangeIdx = loIdx; hiRangeIdx = hiIdx;
  }
  isCpChromatic = cpChromaticChk.checked;
  const candidateIdx = isCpChromatic
    ? Array.from({ length: hiIdx - loIdx + 1 }, (_, k) => loIdx + k)
    : diatonicIndicesInRange(loIdx, hiIdx, key);
  const totalUnits = measureUnits(ts);
  cpPositionUsed = document.querySelector('#cpPositionRow .voice-btn.active').dataset.pos;

  if (cpBassOn) {
    // simplified preview: bass is scoped to 1:1 species only for now
    cpN = 1;
    cpSpeciesSel.value = 1;
    cpDur = pickUniformDuration(totalUnits);
    const n = (totalUnits / cpDur) * 2;
    const result = generateThreeVoices(n, candidateIdx, cpPositionUsed, key, 120);
    if (result) {
      cpCf = result.cf; cpCp = result.cp; cpBass = result.bass; cpSlots = null;
    } else {
      // exceedingly rare; fall back to a plain 2-voice result for this round
      cpBassOn = false;
      const fallback = generateFirstSpeciesCounterpoint(n, candidateIdx, cpPositionUsed, key, 50);
      if (fallback) { cpCf = fallback.cf; cpCp = fallback.cp; cpSlots = null; }
    }
    render();
    return;
  }

  const speciesChoices = [1, 2, 4, 'S4'];
  const chosenSpecies = cpSpeciesRandomChk.checked ? speciesChoices[randInt(4)] : cpSpeciesSel.value;

  if (chosenSpecies === 'S4') {
    const cfCandidatesS4 = [2,4,8,16].filter(u => totalUnits % u === 0);
    if (cfCandidatesS4.length) {
      cpDur = cfCandidatesS4[randInt(cfCandidatesS4.length)];
      const m = (totalUnits / cpDur) * 2;
      const result = generateFourthSpecies(m, candidateIdx, cpPositionUsed, key, 60);
      if (result) {
        isSusMode = true;
        cpSpeciesSel.value = 'S4';
        cpSusCf = result.cf; cpSusPrep = result.prep; cpSusIsSuspension = result.isSuspension;
        render();
        return;
      }
    }
  }

  cpN = (chosenSpecies === 'S4') ? [1, 2, 4][randInt(3)] : Number(chosenSpecies);

  if (cpN > 1) {
    // N:1 species need a cantus-firmus note value that both divides the
    // measure evenly AND splits evenly into N counterpoint notes. Some
    // odd time-signature/denominator combinations have no such value
    // (e.g. 3/8 with N=4) - fall back to species 1 cleanly rather than
    // produce a fractional note count.
    const cfCandidates = [1,2,4,8,16].filter(u => totalUnits % u === 0 && Number.isInteger(u / cpN));
    if (!cfCandidates.length) cpN = 1;
  }
  cpSpeciesSel.value = cpN;

  if (cpN === 1) {
    cpDur = pickUniformDuration(totalUnits);
    const n = (totalUnits / cpDur) * 2;
    let result = generateFirstSpeciesCounterpoint(n, candidateIdx, cpPositionUsed, key, 50);
    if (!result) result = generateFirstSpeciesCounterpoint(n, candidateIdx, cpPositionUsed, key, 50); // one more try, extremely unlikely to be needed
    if (result) { cpCf = result.cf; cpCp = result.cp; cpSlots = null; }
  } else {
    const cfCandidates = [1,2,4,8,16].filter(u => totalUnits % u === 0 && Number.isInteger(u / cpN));
    cpDur = cfCandidates[randInt(cfCandidates.length)];
    const cfNoteCount = (totalUnits / cpDur) * 2;
    let result = generateNSpeciesCounterpoint(cfNoteCount, cpN, candidateIdx, cpPositionUsed, key, 50);
    if (!result) {
      // fall back to species 1 rather than leave a stale piece on screen
      cpN = 1;
      cpSpeciesSel.value = 1;
      cpDur = pickUniformDuration(totalUnits);
      const n = (totalUnits / cpDur) * 2;
      result = generateFirstSpeciesCounterpoint(n, candidateIdx, cpPositionUsed, key, 50);
      if (result) cpSlots = null;
    }
    if (result) { cpCf = result.cf; cpCp = result.cp; if (cpN > 1) cpSlots = result.slots; }
  }
  render();
}

generateAndRender();

function buildPulseWave(ctx, duty, harmonics) {
  harmonics = harmonics || 32;
  const real = new Float32Array(harmonics + 1);
  const imag = new Float32Array(harmonics + 1);
  for (let n = 1; n <= harmonics; n++) real[n] = (4 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
  return ctx.createPeriodicWave(real, imag);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = Number(volumeInput.value) / 100;
    masterGain.connect(audioCtx.destination);
    // NES APU-style voices: pulse1 (25% duty) for the cantus firmus, pulse2
    // (12.5% duty, thinner/buzzier) for the counterpoint voice so the two
    // lines stay easy to tell apart by ear, triangle for the bass channel.
    pulseWave25 = buildPulseWave(audioCtx, 0.25);
    pulseWave125 = buildPulseWave(audioCtx, 0.125);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playOneNote(freq, startTime, dur, role) {
  const osc = audioCtx.createOscillator();
  if (role === 'bass') {
    osc.type = 'triangle';
  } else if (role === 'cp') {
    osc.setPeriodicWave(pulseWave125);
  } else {
    osc.setPeriodicWave(pulseWave25);
  }
  osc.frequency.setValueAtTime(freq, startTime);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, startTime);
  g.gain.exponentialRampToValueAtTime(0.85, startTime + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + dur + 0.02);
  scheduledOsc.push(osc);
}

function setActive(idx) {
  if (idx === lastActiveIdx) return;
  if (lastActiveIdx >= 0) {
    const prev = document.getElementById('evt-' + lastActiveIdx);
    if (prev) prev.classList.remove('active');
  }
  if (idx >= 0) {
    const cur = document.getElementById('evt-' + idx);
    if (cur) cur.classList.add('active');
  }
  lastActiveIdx = idx;
}

function tick() {
  if (!isPlaying) return;
  const t = audioCtx.currentTime - playStartCtxTime;
  let active = -1;
  for (const e of eventTimings) {
    if (t >= e.start && t < e.end) { active = e.idx; break; }
  }
  setActive(active);
  rafId = requestAnimationFrame(tick);
}

function stop() {
  isPlaying = false;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if (endTimerId) clearTimeout(endTimerId);
  endTimerId = null;
  scheduledOsc.forEach(o => { try { o.stop(); } catch (e) {} });
  scheduledOsc = [];
  setActive(-1);
  ledEl.classList.remove('on');
  playBtn.classList.remove('playing');
  playBtn.textContent = '▶ 再生';
}

function start() {
  ensureAudio();
  stop();
  isPlaying = true;
  ledEl.classList.add('on');
  playBtn.classList.add('playing');
  playBtn.textContent = '■ 停止';

  const tempo = Number(tempoInput.value);
  const unitSec = (60 / tempo) / 4;
  const t0 = audioCtx.currentTime + 0.06;
  playStartCtxTime = t0;
  eventTimings = [];
  let cursor = 0;

  if (isSusMode) {
    const cpu = cpDur * unitSec / 2; // cpUnit in seconds
    // highlighting follows the 2-per-CF-note visual slots
    for (let i = 0; i < cpSusCf.length * 2; i++) {
      eventTimings.push({ start: cursor, end: cursor + cpu, idx: i });
      cursor += cpu;
    }
    // audio: CF plays normally; CP plays merged (tied) notes, no retrigger
    let cCf = 0;
    cpSusCf.forEach(pitch => {
      const dur = cpDur * unitSec;
      playOneNote(pitchInfo(pitch).freq, t0 + cCf, dur * 0.92, 'cf');
      cCf += dur;
    });
    const { cpEvents } = flattenSuspensionForPlayback(cpSusCf, cpSusPrep, cpDur);
    let cCp = 0;
    cpEvents.forEach(e => {
      const dur = e.units * unitSec;
      if (!e.isRest) playOneNote(pitchInfo(e.pitch).freq, t0 + cCp, dur * 0.92, 'cp');
      cCp += dur;
    });
  } else if (cpBassOn) {
    const dur = cpDur * unitSec;
    for (let i = 0; i < cpCf.length; i++) {
      eventTimings.push({ start: cursor, end: cursor + dur, idx: i });
      playOneNote(pitchInfo(cpCf[i]).freq, t0 + cursor, dur * 0.92, 'cf');
      playOneNote(pitchInfo(cpCp[i]).freq, t0 + cursor, dur * 0.92, 'cp');
      playOneNote(pitchInfo(cpBass[i]).freq, t0 + cursor, dur * 0.92, 'bass');
      cursor += dur;
    }
  } else if (cpN === 1) {
    const dur = cpDur * unitSec;
    for (let i = 0; i < cpCf.length; i++) {
      eventTimings.push({ start: cursor, end: cursor + dur, idx: i });
      playOneNote(pitchInfo(cpCf[i]).freq, t0 + cursor, dur * 0.92, 'cf');
      playOneNote(pitchInfo(cpCp[i]).freq, t0 + cursor, dur * 0.92, 'cp');
      cursor += dur;
    }
  } else {
    const { cfEvents, cpEvents } = flattenSpeciesForPlayback(cpCf, cpSlots, cpCp, cpDur, cpN);
    let cCf = 0;
    cfEvents.forEach(e => {
      const dur = e.units * unitSec;
      playOneNote(pitchInfo(e.pitch).freq, t0 + cCf, dur * 0.92, 'cf');
      cCf += dur;
    });
    let cCp = 0;
    cpEvents.forEach((e, i) => {
      const dur = e.units * unitSec;
      eventTimings.push({ start: cCp, end: cCp + dur, idx: i });
      playOneNote(pitchInfo(e.pitch).freq, t0 + cCp, dur * 0.92, 'cp');
      cCp += dur;
    });
    cursor = cCp;
  }

  endTimerId = setTimeout(stop, (cursor + 0.2) * 1000);
  rafId = requestAnimationFrame(tick);
}

randomBtn.addEventListener('click', () => {
  stop();
  generateAndRender();
});

playBtn.addEventListener('click', () => {
  if (isPlaying) stop();
  else start();
});

midiBtn.addEventListener('click', () => {
  const bpm = Number(tempoInput.value);
  let bytes;
  if (isSusMode) {
    bytes = buildMidiSuspension(cpSusCf, cpSusPrep, ts, bpm, cpDur);
  } else if (cpBassOn) {
    bytes = buildMidiThreeVoice(cpCf, cpCp, cpBass, ts, bpm, cpDur);
  } else if (cpN === 1) {
    bytes = buildMidiCounterpoint(cpCf, cpCp, ts, bpm, cpDur);
  } else {
    const { cfEvents, cpEvents } = flattenSpeciesForPlayback(cpCf, cpSlots, cpCp, cpDur, cpN);
    bytes = buildMidiSpecies(cfEvents, cpEvents, ts, bpm);
  }
  const blob = new Blob([bytes], { type: 'audio/midi' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = isSusMode
    ? `pikopiko_4thspecies_${cpPositionUsed}_${ts.num}-${ts.den}.mid`
    : cpBassOn
    ? `pikopiko_3voice_${cpPositionUsed}_${ts.num}-${ts.den}.mid`
    : `pikopiko_cp${cpN}-1_${cpPositionUsed}_${ts.num}-${ts.den}.mid`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

tempoInput.addEventListener('input', () => { tempoVal.textContent = tempoInput.value; });
volumeInput.addEventListener('input', () => {
  volumeVal.textContent = volumeInput.value;
  if (masterGain) masterGain.gain.value = Number(volumeInput.value) / 100;
});

cpSpeciesRandomChk.addEventListener('change', applyCpSpeciesRandomState);
cpBassChk.addEventListener('change', applyCpBassState);

document.getElementById('settingsToggle').addEventListener('click', () => {
  const body = document.getElementById('settingsBody');
  const arrow = document.getElementById('settingsArrow');
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  arrow.textContent = collapsed ? '\u25BE' : '\u25B8';
});

document.querySelectorAll('#keyModeRow .voice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#keyModeRow .voice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    refreshKeySelectLabels();
  });
});

cpPositionButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    cpPositionButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
